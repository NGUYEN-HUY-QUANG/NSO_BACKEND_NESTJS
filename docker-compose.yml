version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: nso-mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ninjadb
      MYSQL_USER: nso_user
      MYSQL_PASSWORD: huy2162006

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  backend:
      build: .
      container_name: nso-backend
      restart: always

      ports:
        - "3000:3000"

      depends_on:
        - mysql

      env_file:
        - .env


volumes:
  mysql_data: